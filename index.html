<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주내힘교회 성전 청소</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; }
    input:focus, textarea:focus { outline: 2px solid #56705F; outline-offset: 1px; }
      button:focus-visible { outline: 2px solid #56705F; outline-offset: 2px; }
      </style>
      </head>
      <body>
      <div id="root"></div>
      <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useCallback } = React;

      // ── 번호 슬롯 (자동 배정 순서) ─────────────────────────────
      // 1~9번: 한 명씩 / 10번: 나머지 전원(1~3명, 로비유리·304호 카페 동일 기재)
      const SLOTS = [
        { n: 1,  label: "강대상·앞4줄",        color: "#E9E4D8" },
          { n: 2,  label: "왼쪽 중간",           color: "#EFE5C2" },
            { n: 3,  label: "왼쪽 뒤",             color: "#EBC9C4" },
              { n: 4,  label: "중앙왼쪽 앞",         color: "#E9C7AF" },
                { n: 5,  label: "중앙왼쪽 뒤",         color: "#CBDAC0" },
                  { n: 6,  label: "중앙오른쪽 앞",       color: "#DFC9E0" },
                    { n: 7,  label: "중앙오른쪽 뒤",       color: "#C2D6E3" },
                      { n: 8,  label: "오른쪽 열",           color: "#F0DCC6" },
                        { n: 9,  label: "영아방",              color: "#C7D3CF" },
                          { n: 10, label: "로비유리·304호 카페", color: "#CBC0B5", multi: true },
                          ];

                          // ── 캔버스 구역 → 슬롯 번호 매핑 ──────────────────────────
                          const ZONES = [
                            { id: "podium", slot: 1,  label: "강대상",     geo: { x: 110, y: 120, w: 858, h: 66 } },
                              { id: "front4", slot: 1,  label: "앞4줄",      geo: { x: 110, y: 210, w: 130, h: 150 } },
                                { id: "midL",   slot: 2,                       geo: { x: 110, y: 376, w: 130, h: 394 } },
                                  { id: "backL",  slot: 3,                       geo: { x: 110, y: 786, w: 130, h: 384 } },
                                    { id: "c2f",    slot: 4,                       geo: { x: 266, y: 210, w: 260, h: 470 } },
                                      { id: "c2b",    slot: 5,                       geo: { x: 266, y: 700, w: 260, h: 470 } },
                                        { id: "c3f",    slot: 6,                       geo: { x: 552, y: 210, w: 260, h: 470 } },
                                          { id: "c3b",    slot: 7,                       geo: { x: 552, y: 700, w: 130, h: 470, lTop: { w: 260, h: 275 } } },
                                            { id: "col4",   slot: 8,                       geo: { x: 838, y: 210, w: 130, h: 765 } },
                                              { id: "lobby",  slot: 10, label: "로비유리",   geo: { x: 698, y: 991, w: 270, h: 179 } },
                                                { id: "nursery",slot: 9,  label: "영아방",     geo: { x: 110, y: 1236, w: 380, h: 110 } },
                                                  { id: "cafe",   slot: 10, label: "304호 카페", geo: { x: 530, y: 1236, w: 438, h: 110 } },
                                                  ];

                                                  const W = 1080, H = 1380;
                                                  const HALL = { x: 40, y: 88, w: 1000, h: 1120 };
                                                  const INK = "#26241F";
                                                  const SUB = "rgba(38,36,31,0.52)";
                                                  const LINE = "rgba(38,36,31,0.22)";
                                                  const HALL_LINE = "#8FCCC4";
                                                  const FONT = "'Apple SD Gothic Neo','Malgun Gothic',sans-serif";
                                                  const STORAGE_KEY = "zone-chart-v4";

                                                  function nextSunday() {
                                                    const d = new Date();
                                                      const day = d.getDay();
                                                        if (day !== 0) d.setDate(d.getDate() + (7 - day));
                                                          return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}`;
                                                          }

                                                          // 공백·쉼표·줄바꿈 모두 구분자로 인정
                                                          function parseNames(text) {
                                                            return text.split(/[\s,，]+/).map(s => s.trim()).filter(Boolean);
                                                            }

                                                            // 명단 → 10개 슬롯 배정: 1~9번 한 명씩, 나머지(최대 3명)는 10번
                                                            function assignFromNames(names) {
                                                              const slots = Array(10).fill("");
                                                                for (let i = 0; i < 9 && i < names.length; i++) slots[i] = names[i];
                                                                  if (names.length > 9) slots[9] = names.slice(9, 12).join(", ");
                                                                    return slots;
                                                                    }

                                                                    function roundRect(ctx, x, y, w, h, r) {
                                                                      ctx.beginPath();
                                                                        ctx.moveTo(x + r, y);
                                                                          ctx.arcTo(x + w, y, x + w, y + h, r);
                                                                            ctx.arcTo(x + w, y + h, x, y + h, r);
                                                                              ctx.arcTo(x, y + h, x, y, r);
                                                                                ctx.arcTo(x, y, x + w, y, r);
                                                                                  ctx.closePath();
                                                                                  }

                                                                                  // 브라우저 저장 (localStorage)
                                                                                  const store = {
                                                                                    load() {
                                                                                        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { return null; }
                                                                                          },
                                                                                            save(data) {
                                                                                                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; } catch (e) { return false; }
                                                                                                  },
                                                                                                  };

                                                                                                  function CleaningChart() {
                                                                                                    const [title] = useState("주내힘교회 성전 청소");
                                                                                                      const [dateStr, setDateStr] = useState(nextSunday());
                                                                                                        const [bulk, setBulk] = useState("");
                                                                                                          const [slots, setSlots] = useState(Array(10).fill(""));
                                                                                                            const [warn, setWarn] = useState("");
                                                                                                              const [loaded, setLoaded] = useState(false);
                                                                                                                const [savedFlash, setSavedFlash] = useState(false);
                                                                                                                  const [exportUrl, setExportUrl] = useState(null);
                                                                                                                    const canvasRef = useRef(null);
                                                                                                                      const saveTimer = useRef(null);

                                                                                                                        // ── 저장본 불러오기 ──
                                                                                                                          useEffect(() => {
                                                                                                                              const d = store.load();
                                                                                                                                  if (d) {
                                                                                                                                        if (Array.isArray(d.slots) && d.slots.length === 10) setSlots(d.slots);
                                                                                                                                              if (typeof d.bulk === "string") setBulk(d.bulk);
                                                                                                                                                    if (d.dateStr) setDateStr(d.dateStr);
                                                                                                                                                        }
                                                                                                                                                            setLoaded(true);
                                                                                                                                                              }, []);

                                                                                                                                                                // ── 자동 저장 ──
                                                                                                                                                                  useEffect(() => {
                                                                                                                                                                      if (!loaded) return;
                                                                                                                                                                          clearTimeout(saveTimer.current);
                                                                                                                                                                              saveTimer.current = setTimeout(() => {
                                                                                                                                                                                    if (store.save({ slots, bulk, dateStr })) {
                                                                                                                                                                                            setSavedFlash(true);
                                                                                                                                                                                                    setTimeout(() => setSavedFlash(false), 1200);
                                                                                                                                                                                                          }
                                                                                                                                                                                                              }, 800);
                                                                                                                                                                                                                  return () => clearTimeout(saveTimer.current);
                                                                                                                                                                                                                    }, [slots, bulk, dateStr, loaded]);

                                                                                                                                                                                                                      // ── 이번주 봉사자 일괄 입력 → 자동 배정 ──
                                                                                                                                                                                                                        const onBulkChange = (text) => {
                                                                                                                                                                                                                            setBulk(text);
                                                                                                                                                                                                                                const names = parseNames(text);
                                                                                                                                                                                                                                    if (names.length === 0) { setWarn(""); return; }
                                                                                                                                                                                                                                        setSlots(assignFromNames(names));
                                                                                                                                                                                                                                            setWarn(names.length > 12
                                                                                                                                                                                                                                                  ? `${names.length}명이 입력됐어요. 13번째부터는 제외됩니다 (최대 12명 = 1~9번 각 1명 + 10번에 3명).`
                                                                                                                                                                                                                                                        : "");
                                                                                                                                                                                                                                                          };

                                                                                                                                                                                                                                                            // ── 캔버스 그리기 ──
                                                                                                                                                                                                                                                              const draw = useCallback(() => {
                                                                                                                                                                                                                                                                  const canvas = canvasRef.current;
                                                                                                                                                                                                                                                                      if (!canvas) return;
                                                                                                                                                                                                                                                                          const S = 2;
                                                                                                                                                                                                                                                                              canvas.width = W * S;
                                                                                                                                                                                                                                                                                  canvas.height = H * S;
                                                                                                                                                                                                                                                                                      const ctx = canvas.getContext("2d");
                                                                                                                                                                                                                                                                                          ctx.scale(S, S);

                                                                                                                                                                                                                                                                                              ctx.fillStyle = "#FFFFFF";
                                                                                                                                                                                                                                                                                                  ctx.fillRect(0, 0, W, H);

                                                                                                                                                                                                                                                                                                      ctx.textBaseline = "middle";
                                                                                                                                                                                                                                                                                                          ctx.fillStyle = INK;
                                                                                                                                                                                                                                                                                                              ctx.font = `800 30px ${FONT}`;
                                                                                                                                                                                                                                                                                                                  ctx.fillText(title, HALL.x, 44);
                                                                                                                                                                                                                                                                                                                      ctx.font = `600 22px ${FONT}`;
                                                                                                                                                                                                                                                                                                                          ctx.fillStyle = SUB;
                                                                                                                                                                                                                                                                                                                              ctx.textAlign = "right";
                                                                                                                                                                                                                                                                                                                                  ctx.fillText(dateStr, HALL.x + HALL.w, 46);
                                                                                                                                                                                                                                                                                                                                      ctx.textAlign = "left";

                                                                                                                                                                                                                                                                                                                                          roundRect(ctx, HALL.x, HALL.y, HALL.w, HALL.h, 20);
                                                                                                                                                                                                                                                                                                                                              ctx.strokeStyle = HALL_LINE;
                                                                                                                                                                                                                                                                                                                                                  ctx.lineWidth = 4;
                                                                                                                                                                                                                                                                                                                                                      ctx.stroke();

                                                                                                                                                                                                                                                                                                                                                          const fitSize = (text, maxWidth, startSize) => {
                                                                                                                                                                                                                                                                                                                                                                let size = startSize;
                                                                                                                                                                                                                                                                                                                                                                      while (size > 15) {
                                                                                                                                                                                                                                                                                                                                                                              ctx.font = `800 ${size}px ${FONT}`;
                                                                                                                                                                                                                                                                                                                                                                                      if (ctx.measureText(text).width <= maxWidth) break;
                                                                                                                                                                                                                                                                                                                                                                                              size -= 1;
                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                          return size;
                                                                                                                                                                                                                                                                                                                                                                                                              };

                                                                                                                                                                                                                                                                                                                                                                                                                  for (const z of ZONES) {
                                                                                                                                                                                                                                                                                                                                                                                                                        const g = z.geo;
                                                                                                                                                                                                                                                                                                                                                                                                                              const slot = SLOTS[z.slot - 1];

                                                                                                                                                                                                                                                                                                                                                                                                                                    if (g.lTop) {
                                                                                                                                                                                                                                                                                                                                                                                                                                            const r = 12, x = g.x, y = g.y;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    const wT = g.lTop.w, hT = g.lTop.h, wC = g.w, hA = g.h;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.moveTo(x + r, y);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.arcTo(x + wT, y, x + wT, y + hT, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.arcTo(x + wT, y + hT, x + wC, y + hT, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.arcTo(x + wC, y + hT, x + wC, y + hA, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.arcTo(x + wC, y + hA, x, y + hA, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.arcTo(x, y + hA, x, y, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.arcTo(x, y, x + wT, y, r);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.closePath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          roundRect(ctx, g.x, g.y, g.w, g.h, 12);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.fillStyle = slot.color;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.strokeStyle = LINE;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.lineWidth = 1.5;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.stroke();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let topPad = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (z.label) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.fillStyle = SUB;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.font = `700 16px ${FONT}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (z.id === "podium") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillText(z.label, g.x + 18, g.y + g.h / 2 + 1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.fillText(z.label, g.x + 16, g.y + 23);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        topPad = 12;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const name = slots[z.slot - 1] || "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (!name) continue;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.fillStyle = INK;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              let lines = name.split(/[,，]/).map(s => s.trim()).filter(Boolean).slice(0, 3);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const boxW = g.lTop ? g.lTop.w : g.w;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const boxH = g.lTop ? g.lTop.h : g.h;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const maxW = boxW - 32;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const cx = g.x + boxW / 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const cy = g.y + boxH / 2 + (g.lTop ? 2 : topPad / 2 + 1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const base = boxH <= 160 ? 25 : 29;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (lines.length > 1 && lines.length * base * 1.3 > boxH - 26) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                lines = [lines.join(" · ")];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const size = Math.min(...lines.map(l => fitSize(l, maxW, base)));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.font = `800 ${size}px ${FONT}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.textAlign = "center";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const gap = size * 1.3;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const startY = cy - ((lines.length - 1) * gap) / 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * gap));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.textAlign = "left";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }, [slots, title, dateStr]);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        useEffect(() => { draw(); }, [draw]);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // ── 이미지 저장 ──
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const exportImage = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const canvas = canvasRef.current;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setExportUrl(canvas.toDataURL("image/png"));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const fileName = () => `성전청소_${dateStr.replace(/[.\s]+/g, "-").replace(/-+$/, "")}.png`;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const shareImage = async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const blob = await (await fetch(exportUrl)).blob();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const file = new File([blob], fileName(), { type: "image/png" });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await navigator.share({ files: [file], title: `${title} ${dateStr}` });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      alert("이 브라우저에서는 공유가 지원되지 않아요. '파일로 저장'을 누르거나 이미지를 길게 눌러 저장해주세요.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (e && e.name !== "AbortError") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              alert("공유에 실패했어요. '파일로 저장'을 누르거나 이미지를 길게 눌러 저장해주세요.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
